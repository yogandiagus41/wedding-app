<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Invitation Sender</title>

    <link rel="stylesheet" href="admin.css">

</head>

<body>




    <div class="content">

        <div class="card">

            <h1>
                Kirim Undangan
            </h1>


            <div class="form-group">

                <label>
                    Nama Tamu
                </label>

                <input type="text" id="guestName" placeholder="Contoh : Agus Yogandi">

            </div>


            <div class="form-group">

                <label>
                    Kelompok
                </label>

                <input type="text" id="guestGroup" placeholder="Contoh : Teman Sekolah">

            </div>


            <button id="sendWA">

                Kirim WhatsApp

            </button>


        </div>

        <br>

        <!-- LIST TAMU -->

        <div class="card guest-card">

            <div class="card-header">

                <h1>
                    Undangan Terkirim
                </h1>

                <button id="resetData" class="btn btn-primary">

                    Reset Semua

                </button>

            </div>


            <div id="guestList">

                Belum ada undangan dikirim.

            </div>


        </div>


    </div>

    <script src="admin.js"></script>

</body>

</html>
