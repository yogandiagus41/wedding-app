<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agus & Wenna Wedding</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sacramento&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- simplyCountDown -->

    <script src="https://cdn.jsdelivr.net/npm/simplycountdown.js@1.7.0/dist/simplyCountdown.min.js"></script>
    <link rel="stylesheet" href="assets/css/ct.css">
</head>

<body>
    <section id="hero"
        class="hero w-100 h-100 p-3 mx-auto text-center d-flex justify-content-center align-items-center text-white">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="assets/img/vid1.mp4" type="video/mp4">
            Browser Anda tidak mendukung video.
        </video>

        <div class="overlay"></div>
        <main class="hero-content">
            <h4>Kepada Yth. Bapak/Ibu/Saudara/i</h4>
            <h1>Agus & Wenna</h1>
            <p>Dengan segala hormat, kami mengundang Bapak/Ibu/Saudara/i untuk menghadiri acara pernikahan kami.</p>

            <div class="simply-countdown mb-2"></div>
            <p>Hari Lagi</p>

            <a href="#undangan" id="openInvitation" class="btn btn-lg mt-4">Lihat Undangan</a>
        </main>
    </section>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p class="loading-text">Membuka Undangan</p>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>
    <script>
        simplyCountdown(".simply-countdown", {
            year: 2026,
            month: 12,
            day: 5,
        });

        // Buka undangan: tampilkan loading spinner sebentar, lalu reveal konten
        const openBtn = document.getElementById("openInvitation");
        const overlay = document.getElementById("loadingOverlay");

        openBtn.addEventListener("click", function (e) {
            e.preventDefault();
            overlay.classList.add("active");

            setTimeout(function () {
                overlay.classList.remove("active");
                content.classList.add("visible");
                content.scrollIntoView({
                    behavior: "smooth"
                });
            }, 1200);
        });
    </script>
</body>

</html>
